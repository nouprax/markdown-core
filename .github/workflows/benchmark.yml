name: Benchmark

# Performance workloads are scheduled independently of correctness CI: they
# never run as part of pull-request or push checks, and pnpm test / the
# correctness CTest preset never includes them.

on:
    schedule:
        - cron: "17 4 * * 1"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    benchmark:
        runs-on: ubuntu-latest
        env:
            CC: clang
            CXX: clang++
        steps:
            - uses: actions/checkout@v4
            - name: Configure
              run: cmake --preset default
            - name: Build
              run: cmake --build --preset default --parallel
            - name: Run benchmark workloads (benchmark preset)
              run: ctest --preset benchmark
            - uses: actions/setup-java@v4
              with:
                  cache: gradle
                  distribution: temurin
                  java-version: 26
            - uses: android-actions/setup-android@v3
            - name: Install Android platform
              run: sdkmanager "platforms;android-36"
            - name: Run Kotlin benchmark workloads
              run: scripts/gradle.sh :packages:kotlin-markdown-core:kotlinBenchmark
            - uses: actions/setup-node@v4
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v4
              with:
                  run_install: false
                  version: 11.7.0
            - uses: mymindstorm/setup-emsdk@v14
              with:
                  version: 4.0.23
            - name: Run ES/WASM benchmark workloads
              run: pnpm benchmark:es-node

    swift-benchmark:
        runs-on: macos-26
        steps:
            - uses: actions/checkout@v4
            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "26.6"
            - name: Run Swift native-copy benchmark workload
              run: swift run -c release MarkdownCoreBenchmarks
