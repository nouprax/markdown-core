name: CI

on:
    workflow_call:
    pull_request:
    push:
        branches:
            - main
    merge_group:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    # Keep default-branch push, pull-request, merge-queue, and reusable release
    # runs in separate lanes. GitHub can leave a cancelled runner in teardown
    # indefinitely; cross-event SHA deduplication could then prevent another
    # control-plane run from starting. Newer runs still replace older runs for
    # the same PR or ref.
    group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    health-check-repository:
        name: Health Check - Repository
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - uses: actions/setup-java@v5
              with:
                  cache: gradle
                  distribution: temurin
                  java-version: 26
            - name: Install JavaScript dependencies
              run: pnpm install --frozen-lockfile
            - name: Check prepared repository environment
              run: scripts/init-environment.sh --check node java wrappers dependencies
            - name: Check cross-platform contracts
              run: pnpm check:contracts
            - name: Audit test topology and public surface
              run: |
                  pnpm audit:repository:clean
                  pnpm audit:ci
                  pnpm audit:tests
                  pnpm audit:surface

    health-check-c:
        name: Health Check - C
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - name: Install C health-check dependencies
              run: |
                  python3 -m pip install clang-format==22.1.8
                  pnpm install --frozen-lockfile
            - name: Check C and CMake formatting
              run: |
                  pnpm format:c:check
                  pnpm format:cmake:check
            - name: Lint C
              run: pnpm lint:c

    health-check-es:
        name: Health Check - ES
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - name: Install ES health-check dependencies
              run: pnpm install --frozen-lockfile
            - name: Check ES formatting
              run: pnpm format:es:check
            - name: Lint ES
              run: pnpm lint:es

    health-check-kotlin:
        name: Health Check - Kotlin
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - uses: actions/setup-java@v5
              with:
                  cache: gradle
                  distribution: temurin
                  java-version: 26
            - name: Install Kotlin health-check dependencies
              run: pnpm install --frozen-lockfile
            - name: Check Kotlin formatting and lint
              run: pnpm format:kotlin:check
            - name: Load Gradle model
              run: pnpm check:gradle-model

    package-audit:
        name: Build Test - Repository / Package Contents
        needs: builds-ready
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - uses: actions/setup-java@v5
              with:
                  cache: gradle
                  distribution: temurin
                  java-version: 26
            - uses: android-actions/setup-android@v4
            - uses: emscripten-core/setup-emsdk@v16
              with:
                  version: 4.0.23
            - name: Install package-audit dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install --yes pkg-config
                  sdkmanager "platforms;android-36" "cmake;3.22.1" "ndk;28.2.13676358"
                  pnpm install --frozen-lockfile
            - name: Check prepared package-audit environment
              run: scripts/init-environment.sh --check core node java wrappers android emscripten dependencies
            - name: Audit installed and published package contents
              run: pnpm audit:packages

    health-check-swift:
        name: Health Check - Swift
        runs-on: macos-26
        steps:
            - uses: actions/checkout@v7
            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "26.6"
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - name: Check prepared Swift environment
              run: scripts/init-environment.sh --check node wrappers swift
            - name: Check Swift formatting
              run: scripts/format-swift.sh --check
            - name: Lint Swift
              run: scripts/lint-swift.sh

    health-checks-ready:
        name: Health Checks - Ready
        needs:
            - health-check-repository
            - health-check-c
            - health-check-es
            - health-check-kotlin
            - health-check-swift
        runs-on: ubuntu-latest
        steps:
            - name: Release checked source to build producers
              run: echo "Every repository and platform health check passed."

    c-product-build:
        name: Build - C / ${{ matrix.label }}
        needs: health-checks-ready
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux · Clang · Shared
                      compiler: clang
                      cc: clang
                      cxx: clang++
                      shared: "ON"
                      variant: linux-clang-shared
                    - os: ubuntu-latest
                      label: Linux · GCC · Static
                      compiler: gcc
                      cc: gcc
                      cxx: g++
                      shared: "OFF"
                      variant: linux-gcc-static
                    - os: macos-latest
                      label: macOS · Clang · Shared
                      compiler: clang
                      cc: clang
                      cxx: clang++
                      shared: "ON"
                      variant: macos-clang-shared
        env:
            CC: ${{ matrix.cc }}
            CXX: ${{ matrix.cxx }}
        steps:
            - uses: actions/checkout@v7
            - name: Build immutable C product artifact
              run: |
                  scripts/build-c-product-artifact.sh \
                      "${{ matrix.variant }}" \
                      "${{ matrix.shared }}" \
                      build/ci-artifacts/c-product
            - uses: actions/upload-artifact@v7
              with:
                  name: c-product-${{ matrix.variant }}-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/c-product

    c-product-build-windows:
        name: Build - C / Windows · Static
        needs: health-checks-ready
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v7
            - name: Build immutable C product artifact
              shell: bash
              run: scripts/build-c-product-artifact.sh windows-static OFF build/ci-artifacts/c-product Release
            - uses: actions/upload-artifact@v7
              with:
                  name: c-product-windows-static-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/c-product

    es-product-build:
        name: Build - ES / WASM Package
        needs: health-checks-ready
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - uses: emscripten-core/setup-emsdk@v16
              with:
                  version: 4.0.23
            - name: Install ES build dependencies
              run: pnpm install --frozen-lockfile
            - name: Build immutable ES product artifact
              run: scripts/build-es-product-artifact.sh
            - uses: actions/upload-artifact@v7
              with:
                  name: es-product-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/es-product

    kotlin-product-build:
        name: Build - Kotlin / ${{ matrix.label }}
        needs: health-checks-ready
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux · Release Publications
                      mode: linux-release
                      artifact-label: linux-release
                    - os: macos-26
                      label: macOS · Native Publications
                      mode: macos-native
                      artifact-label: macos-native
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v5
              with:
                  cache: gradle
                  distribution: temurin
                  java-version: 26
            - uses: android-actions/setup-android@v4
              if: matrix.mode == 'linux-release'
            - name: Install Android build dependencies
              if: matrix.mode == 'linux-release'
              run: sdkmanager "platforms;android-36" "cmake;3.22.1" "ndk;28.2.13676358"
            - name: Build immutable Kotlin product artifact
              run: |
                  scripts/build-kotlin-product-artifact.sh \
                      "${{ matrix.mode }}" \
                      "build/ci-artifacts/kotlin-product-${{ matrix.artifact-label }}"
            - uses: actions/upload-artifact@v7
              with:
                  name: kotlin-product-${{ matrix.artifact-label }}-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/kotlin-product-${{ matrix.artifact-label }}

    swift-product-build:
        name: Build - Swift / Product
        needs: health-checks-ready
        runs-on: macos-26
        steps:
            - uses: actions/checkout@v7
            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "26.6"
            - name: Build immutable Swift product artifact
              run: scripts/build-swift-product-artifact.sh
            - uses: actions/upload-artifact@v7
              with:
                  name: swift-product-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/swift-product

    swift-test-build:
        name: Build Test - Swift / Test Products
        needs: builds-ready
        runs-on: macos-26
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v7
            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "26.6"
            - uses: actions/download-artifact@v8
              with:
                  name: swift-product-${{ github.sha }}
                  path: build/ci-artifacts/swift-product
            - name: Restore Swift product tree
              run: |
                  cd build/ci-artifacts/swift-product
                  shasum -a 256 -c SHA256SUMS
                  tar -xzf swift-product-tree.tar.gz -C ../../..
            - name: Build immutable macOS and iOS test products
              run: scripts/build-swift-test-artifact.sh
            - uses: actions/upload-artifact@v7
              with:
                  name: swift-test-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/swift

    swift-test:
        name: Test - Swift / ${{ matrix.label }}
        needs: build-tests-ready
        runs-on: macos-26
        timeout-minutes: 12
        strategy:
            fail-fast: false
            matrix:
                include:
                    - suite: macos-correctness
                      label: macOS · Correctness
                    - suite: macos-conformance
                      label: macOS · Conformance
                    - suite: ios-correctness
                      label: iOS · Correctness
                    - suite: ios-conformance
                      label: iOS · Conformance
        steps:
            - uses: actions/checkout@v7
            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "26.6"
            - uses: actions/download-artifact@v8
              with:
                  name: swift-test-${{ github.sha }}
                  path: build/ci-artifacts/swift
            - name: Run Swift suite without building
              run: scripts/run-swift-test-artifact.sh build/ci-artifacts/swift "${{ matrix.suite }}"

    swift-deployment-contract:
        name: Build - Swift / ${{ matrix.label }}
        needs: health-checks-ready
        runs-on: macos-26
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: iOS
                      version: "18.0"
                      label: iOS 18
                    - platform: iOS
                      version: "26.0"
                      label: iOS 26
                    - platform: macOS
                      version: "15.0"
                      label: macOS 15
                    - platform: macOS
                      version: "26.0"
                      label: macOS 26
        steps:
            - uses: actions/checkout@v7
            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "26.6"
            - name: Build declared deployment target
              env:
                  PLATFORM: ${{ matrix.platform }}
                  VERSION: ${{ matrix.version }}
              run: scripts/build-swift-deployment.sh "$PLATFORM" "$VERSION"

    kotlin-test-build:
        name: Build Test - Kotlin / ${{ matrix.label }}
        needs: builds-ready
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: linuxX64
                      target-id: linux-x64
                      label: Linux x64 · Host Tests
                    - os: macos-26
                      target: macosArm64
                      target-id: macos-arm64
                      label: macOS arm64 · Host Tests
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v5
              with:
                  cache: gradle
                  distribution: temurin
                  java-version: 26
            - uses: android-actions/setup-android@v4
            - name: Install Android build dependencies
              if: matrix.os == 'ubuntu-latest'
              run: sdkmanager "platforms;android-36" "cmake;3.22.1" "ndk;28.2.13676358"
            - name: Build immutable Kotlin test products
              run: scripts/build-kotlin-host-test-artifact.sh "${{ matrix.target }}"
            - uses: actions/upload-artifact@v7
              with:
                  name: kotlin-host-${{ matrix.target-id }}-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/kotlin-${{ matrix.target }}

    kotlin-test:
        name: Test - Kotlin / ${{ matrix.label }}
        needs: build-tests-ready
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      artifact-target: linux-x64
                      artifact-dir: linuxX64
                      platform: linux-x64
                      suite: correctness
                      label: Linux x64 · Correctness
                    - os: ubuntu-latest
                      artifact-target: linux-x64
                      artifact-dir: linuxX64
                      platform: linux-x64
                      suite: conformance
                      label: Linux x64 · Conformance
                    - os: macos-26
                      artifact-target: macos-arm64
                      artifact-dir: macosArm64
                      platform: macos-arm64
                      suite: correctness
                      label: macOS arm64 · Correctness
                    - os: macos-26
                      artifact-target: macos-arm64
                      artifact-dir: macosArm64
                      platform: macos-arm64
                      suite: conformance
                      label: macOS arm64 · Conformance
                    - os: ubuntu-latest
                      artifact-target: linux-x64
                      artifact-dir: linuxX64
                      platform: jvm
                      suite: correctness
                      label: JVM · Correctness
                    - os: ubuntu-latest
                      artifact-target: linux-x64
                      artifact-dir: linuxX64
                      platform: jvm
                      suite: conformance
                      label: JVM · Conformance
                    - os: ubuntu-latest
                      artifact-target: linux-x64
                      artifact-dir: linuxX64
                      platform: android-host
                      suite: correctness
                      label: Android Host · Correctness
                    - os: ubuntu-latest
                      artifact-target: linux-x64
                      artifact-dir: linuxX64
                      platform: android-host
                      suite: conformance
                      label: Android Host · Conformance
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v5
              if: matrix.platform == 'jvm' || matrix.platform == 'android-host'
              with:
                  distribution: temurin
                  java-version: 26
            - uses: actions/download-artifact@v8
              with:
                  name: kotlin-host-${{ matrix.artifact-target }}-${{ github.sha }}
                  path: build/ci-artifacts/kotlin-${{ matrix.artifact-dir }}
            - name: Run Kotlin suite without building
              run: |
                  scripts/run-kotlin-host-test-artifact.sh \
                      "build/ci-artifacts/kotlin-${{ matrix.artifact-dir }}" \
                      "${{ matrix.platform }}" \
                      "${{ matrix.suite }}"

    kotlin-consumers:
        name: Build Test - Kotlin / Consumers
        needs: builds-ready
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v5
              with:
                  cache: gradle
                  distribution: temurin
                  java-version: 26
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - uses: android-actions/setup-android@v4
            - name: Install Android build dependencies
              run: sdkmanager "platforms;android-36" "cmake;3.22.1" "ndk;28.2.13676358"
            - name: Verify Kotlin publication consumers
              run: pnpm check:kotlin-consumers

    kotlin-android-test-build:
        name: Build Test - Kotlin / Android x86_64 · Instrumentation APK
        needs: builds-ready
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v5
              with:
                  cache: gradle
                  distribution: temurin
                  java-version: 26
            - uses: android-actions/setup-android@v4
            - name: Install Android build dependencies
              run: sdkmanager "platforms;android-36" "cmake;3.22.1" "ndk;28.2.13676358"
            - name: Build immutable Android instrumentation artifact
              run: scripts/build-kotlin-android-test-artifact.sh
            - name: Upload Android instrumentation artifact
              uses: actions/upload-artifact@v7
              with:
                  name: kotlin-android-x86_64-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/kotlin-android-x86_64

    kotlin-android-test:
        # Each leaf receives the same immutable APK and owns exactly one fresh
        # emulator lifecycle. No Gradle, JVM, NDK, CMake, publication, managed
        # device snapshot, or other test suite runs on these consumers.
        name: Test - Kotlin / Android · ${{ matrix.label }}
        needs: build-tests-ready
        runs-on: ubuntu-24.04
        timeout-minutes: 12
        strategy:
            fail-fast: false
            matrix:
                include:
                    - page-size: 4k
                      page-size-label: 4 KB
                      system-image: google_apis
                      suite: correctness
                      label: 4 KB · x86_64 · Correctness
                    - page-size: 16k
                      page-size-label: 16 KB
                      system-image: google_apis_ps16k
                      suite: correctness
                      label: 16 KB · x86_64 · Correctness
                    - page-size: 4k
                      page-size-label: 4 KB
                      system-image: google_apis
                      suite: conformance
                      label: 4 KB · x86_64 · Conformance
                    - page-size: 16k
                      page-size-label: 16 KB
                      system-image: google_apis_ps16k
                      suite: conformance
                      label: 16 KB · x86_64 · Conformance
        steps:
            - uses: actions/checkout@v7
            - uses: android-actions/setup-android@v4
            - name: Install one Android runtime image
              run: |
                  sdkmanager \
                      "emulator" \
                      "system-images;android-36;${{ matrix.system-image }};x86_64"
            - name: Enable KVM
              run: |
                  echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                  sudo udevadm control --reload-rules
                  sudo udevadm trigger --name-match=kvm
            - name: Verify runner architecture and emulator acceleration
              run: |
                  test "${{ runner.arch }}" = "X64"
                  test -c /dev/kvm
                  test -r /dev/kvm
                  test -w /dev/kvm
                  "$ANDROID_HOME/emulator/emulator" -accel-check
            - name: Download immutable Android instrumentation artifact
              uses: actions/download-artifact@v8
              with:
                  name: kotlin-android-x86_64-${{ github.sha }}
                  path: build/ci-artifacts/kotlin-android-x86_64
            - name: Run Android ${{ matrix.suite }} without building
              run: |
                  scripts/run-kotlin-android-test-artifact.sh \
                      build/ci-artifacts/kotlin-android-x86_64 \
                      "${{ matrix.suite }}" \
                      "${{ matrix.page-size }}"
            - name: Upload Android test failure evidence
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: android-${{ matrix.page-size }}-${{ matrix.suite }}-failure-${{ github.run_attempt }}
                  if-no-files-found: warn
                  retention-days: 14
                  path: ${{ runner.temp }}/android-test-${{ matrix.page-size }}-${{ matrix.suite }}

    es-test-build:
        name: Build Test - ES / Test Bundle
        needs: builds-ready
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - uses: emscripten-core/setup-emsdk@v16
              with:
                  version: 4.0.23
            - name: Install JavaScript dependencies
              run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v8
              with:
                  name: es-product-${{ github.sha }}
                  path: build/ci-artifacts/es-product
            - name: Build immutable ES test artifact
              run: scripts/build-es-test-artifact.sh build/ci-artifacts/es build/ci-artifacts/es-product
            - uses: actions/upload-artifact@v7
              with:
                  name: es-test-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/es

    es-test:
        name: Test - ES / ${{ matrix.label }}
        needs: build-tests-ready
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - suite: node-correctness
                      label: Node · Correctness
                    - suite: browser-correctness
                      label: Browser · Correctness
                    - suite: node-conformance
                      label: Node · Conformance
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: pnpm/action-setup@v6
              with:
                  run_install: false
                  version: 11.7.0
            - uses: browser-actions/setup-chrome@v2
              id: setup-chrome
              if: matrix.suite == 'browser-correctness'
            - name: Install test-runner dependencies
              run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v8
              with:
                  name: es-test-${{ github.sha }}
                  path: build/ci-artifacts/es
            - name: Run ES suite without building
              run: scripts/run-es-test-artifact.sh build/ci-artifacts/es "${{ matrix.suite }}"
              env:
                  CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}

    c-test-build:
        name: Build Test - C / ${{ matrix.label }}
        needs: builds-ready
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      label: Linux · Clang · Shared
                      compiler: clang
                      cc: clang
                      cxx: clang++
                      shared: "ON"
                      product-variant: linux-clang-shared
                    - os: ubuntu-latest
                      label: Linux · GCC · Static
                      compiler: gcc
                      cc: gcc
                      cxx: g++
                      shared: "OFF"
                      product-variant: linux-gcc-static
                    - os: macos-latest
                      label: macOS · Clang · Shared
                      compiler: clang
                      cc: clang
                      cxx: clang++
                      shared: "ON"
                      product-variant: macos-clang-shared
        env:
            CC: ${{ matrix.cc }}
            CXX: ${{ matrix.cxx }}
        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: c-product-${{ matrix.product-variant }}-${{ github.sha }}
                  path: build/ci-artifacts/c-product
            - name: Restore C product tree
              run: |
                  cd build/ci-artifacts/c-product
                  if command -v sha256sum >/dev/null 2>&1; then
                      sha256sum --check SHA256SUMS
                  else
                      shasum -a 256 -c SHA256SUMS
                  fi
                  tar -xzf c-product-tree.tar.gz -C ../../..
            - name: Configure
              run: scripts/build-c-test-artifact.sh default "${{ matrix.shared }}" build/ci-artifacts/c
            - uses: actions/upload-artifact@v7
              with:
                  name: c-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.shared }}-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/c

    c-test-build-windows:
        name: Build Test - C / Windows · Static
        needs: builds-ready
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: c-product-windows-static-${{ github.sha }}
                  path: build/ci-artifacts/c-product
            - name: Restore C product tree
              shell: bash
              run: |
                  cd build/ci-artifacts/c-product
                  sha256sum --check SHA256SUMS
                  tar -xzf c-product-tree.tar.gz -C ../../..
            - name: Build immutable C test artifact
              shell: bash
              run: scripts/build-c-test-artifact.sh default OFF build/ci-artifacts/c Release
            - uses: actions/upload-artifact@v7
              with:
                  name: c-windows-static-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/c

    c-sanitizer-test-build:
        name: Build Test - C Sanitizer / ${{ matrix.label }}
        needs: builds-ready
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - sanitizer: asan
                      label: ASan
                    - sanitizer: ubsan
                      label: UBSan
                    - sanitizer: tsan
                      label: TSan
        env: { CC: clang, CXX: clang++ }
        steps:
            - uses: actions/checkout@v7
            - name: Build immutable sanitizer test artifact
              run: scripts/build-c-test-artifact.sh "${{ matrix.sanitizer }}" - build/ci-artifacts/c
            - uses: actions/upload-artifact@v7
              with:
                  name: c-${{ matrix.sanitizer }}-${{ github.sha }}
                  if-no-files-found: error
                  retention-days: 7
                  path: build/ci-artifacts/c

    c-test:
        name: Test - C / ${{ matrix.label }}
        needs: build-tests-ready
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      compiler: clang
                      shared: "ON"
                      suite: correctness
                      label: Linux · Clang · Shared · Correctness
                    - os: ubuntu-latest
                      compiler: clang
                      shared: "ON"
                      suite: conformance
                      label: Linux · Clang · Shared · Conformance
                    - os: ubuntu-latest
                      compiler: gcc
                      shared: "OFF"
                      suite: correctness
                      label: Linux · GCC · Static · Correctness
                    - os: ubuntu-latest
                      compiler: gcc
                      shared: "OFF"
                      suite: conformance
                      label: Linux · GCC · Static · Conformance
                    - os: macos-latest
                      compiler: clang
                      shared: "ON"
                      suite: correctness
                      label: macOS · Clang · Shared · Correctness
                    - os: macos-latest
                      compiler: clang
                      shared: "ON"
                      suite: conformance
                      label: macOS · Clang · Shared · Conformance
        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: c-${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.shared }}-${{ github.sha }}
                  path: build/ci-artifacts/c
            - name: Run CTest suite without building
              run: scripts/run-c-test-artifact.sh build/ci-artifacts/c "${{ matrix.suite }}"

    c-test-windows:
        name: Test - C / ${{ matrix.label }}
        needs: build-tests-ready
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - suite: correctness
                      label: Windows · Static · Correctness
                    - suite: conformance
                      label: Windows · Static · Conformance
        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: c-windows-static-${{ github.sha }}
                  path: build/ci-artifacts/c
            - name: Run CTest suite without building
              shell: bash
              run: scripts/run-c-test-artifact.sh build/ci-artifacts/c "${{ matrix.suite }}" Release

    # ThreadSanitizer gates the frozen concurrency contract. All sanitizer
    # consumers execute a prebuilt instrumented tree on a fresh runner.
    c-sanitizer-test:
        name: Test - C Sanitizer / ${{ matrix.label }}
        needs: build-tests-ready
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - sanitizer: asan
                      preset: correctness-asan
                      label: ASan
                    - sanitizer: ubsan
                      preset: correctness-ubsan
                      label: UBSan
                    - sanitizer: tsan
                      preset: correctness-tsan
                      label: TSan
        env:
            ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=1
            UBSAN_OPTIONS: halt_on_error=1:abort_on_error=1:print_stacktrace=1
            TSAN_OPTIONS: halt_on_error=1:abort_on_error=1
        steps:
            - uses: actions/checkout@v7
            - uses: actions/download-artifact@v8
              with:
                  name: c-${{ matrix.sanitizer }}-${{ github.sha }}
                  path: build/ci-artifacts/c
            - name: Run sanitizer suite without building
              run: scripts/run-c-test-artifact.sh build/ci-artifacts/c "${{ matrix.preset }}"

    benchmark-c:
        name: Test - C / Linux · Benchmark
        needs: build-tests-ready
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: actions/download-artifact@v8
              with:
                  name: c-ubuntu-latest-clang-ON-${{ github.sha }}
                  path: build/ci-artifacts/c
            - name: Run C benchmark suite without building
              run: |
                  mkdir -p build/pr-metrics-logs
                  scripts/run-c-test-artifact.sh build/ci-artifacts/c benchmark \
                      2>&1 | tee build/pr-metrics-logs/c.log
            - name: Collect informational C metrics
              if: ${{ always() }}
              continue-on-error: true
              env:
                  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
              run: node scripts/collect-pr-metrics.mjs --platform linux --logs build/pr-metrics-logs --output build/pr-metrics/c-linux.json
            - name: Upload informational C metrics
              if: ${{ always() }}
              continue-on-error: true
              uses: actions/upload-artifact@v7
              with:
                  name: pr-metrics-c-linux
                  path: build/pr-metrics/c-linux.json
                  if-no-files-found: warn
                  retention-days: 14

    benchmark-kotlin:
        name: Test - Kotlin / JVM · Benchmark
        needs: build-tests-ready
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: 26
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: actions/download-artifact@v8
              with:
                  name: kotlin-host-linux-x64-${{ github.sha }}
                  path: build/ci-artifacts/kotlin-linuxX64
            - name: Run Kotlin benchmark suite without building
              run: |
                  mkdir -p build/pr-metrics-logs
                  scripts/run-kotlin-host-test-artifact.sh \
                      build/ci-artifacts/kotlin-linuxX64 jvm benchmark \
                      2>&1 | tee build/pr-metrics-logs/kotlin.log
            - name: Collect informational Kotlin metrics
              if: ${{ always() }}
              continue-on-error: true
              env:
                  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
              run: node scripts/collect-pr-metrics.mjs --platform linux --logs build/pr-metrics-logs --output build/pr-metrics/kotlin-jvm.json
            - name: Upload informational Kotlin metrics
              if: ${{ always() }}
              continue-on-error: true
              uses: actions/upload-artifact@v7
              with:
                  name: pr-metrics-kotlin-jvm
                  path: build/pr-metrics/kotlin-jvm.json
                  if-no-files-found: warn
                  retention-days: 14

    benchmark-es:
        name: Test - ES / Node · Benchmark
        needs: build-tests-ready
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: actions/download-artifact@v8
              with:
                  name: es-test-${{ github.sha }}
                  path: build/ci-artifacts/es
            - name: Run ES benchmark suite without building
              run: |
                  mkdir -p build/pr-metrics-logs
                  scripts/run-es-test-artifact.sh build/ci-artifacts/es node-benchmark \
                      2>&1 | tee build/pr-metrics-logs/es.log
            - name: Collect informational ES metrics
              if: ${{ always() }}
              continue-on-error: true
              env:
                  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
              run: node scripts/collect-pr-metrics.mjs --platform linux --logs build/pr-metrics-logs --output build/pr-metrics/es-node.json
            - name: Upload informational ES metrics
              if: ${{ always() }}
              continue-on-error: true
              uses: actions/upload-artifact@v7
              with:
                  name: pr-metrics-es-node
                  path: build/pr-metrics/es-node.json
                  if-no-files-found: warn
                  retention-days: 14

    benchmark-swift:
        name: Test - Swift / macOS · Benchmark
        needs: build-tests-ready
        runs-on: macos-26
        steps:
            - uses: actions/checkout@v7
            - uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: "26.6"
            - uses: actions/setup-node@v7
              with:
                  node-version: 26.5.0
            - uses: actions/download-artifact@v8
              with:
                  name: swift-test-${{ github.sha }}
                  path: build/ci-artifacts/swift
            - name: Run Swift benchmark suite without building
              run: |
                  mkdir -p build/pr-metrics-logs
                  scripts/run-swift-test-artifact.sh build/ci-artifacts/swift macos-benchmark \
                      2>&1 | tee build/pr-metrics-logs/swift.log
            - name: Collect informational Swift metrics
              if: ${{ always() }}
              continue-on-error: true
              env:
                  SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
              run: node scripts/collect-pr-metrics.mjs --platform macos --logs build/pr-metrics-logs --output build/pr-metrics/macos.json
            - name: Upload informational Swift metrics
              if: ${{ always() }}
              continue-on-error: true
              uses: actions/upload-artifact@v7
              with:
                  name: pr-metrics-swift-macos
                  path: build/pr-metrics/macos.json
                  if-no-files-found: warn
                  retention-days: 14

    benchmarks-ready:
        name: Benchmarks - Ready
        if: ${{ always() }}
        needs: [benchmark-c, benchmark-kotlin, benchmark-es, benchmark-swift]
        runs-on: ubuntu-latest
        steps:
            - name: Require every platform benchmark
              env:
                  C: ${{ needs.benchmark-c.result }}
                  KOTLIN: ${{ needs.benchmark-kotlin.result }}
                  ES: ${{ needs.benchmark-es.result }}
                  SWIFT: ${{ needs.benchmark-swift.result }}
              run: |
                  for result in "$C" "$KOTLIN" "$ES" "$SWIFT"; do
                      test "$result" = success
                  done

    builds-ready:
        name: Builds - Ready
        needs:
            - c-product-build
            - c-product-build-windows
            - es-product-build
            - kotlin-product-build
            - swift-product-build
            - swift-deployment-contract
        runs-on: ubuntu-latest
        steps:
            - name: Release immutable build artifacts to build tests
              run: echo "Every platform build artifact is ready."

    build-tests-ready:
        name: Build Tests - Ready
        needs:
            - package-audit
            - kotlin-consumers
            - swift-test-build
            - kotlin-test-build
            - kotlin-android-test-build
            - es-test-build
            - c-test-build
            - c-test-build-windows
            - c-sanitizer-test-build
        runs-on: ubuntu-latest
        steps:
            - name: Release build-tested artifacts to parallel test consumers
              run: echo "Every platform build test passed."

    tests-ready:
        name: Tests - Ready
        if: ${{ always() }}
        needs:
            - swift-test
            - kotlin-test
            - kotlin-android-test
            - es-test
            - c-test
            - c-test-windows
            - c-sanitizer-test
            - benchmarks-ready
        runs-on: ubuntu-latest
        steps:
            - name: Require every platform test
              env:
                  SWIFT_TEST: ${{ needs.swift-test.result }}
                  KOTLIN_TEST: ${{ needs.kotlin-test.result }}
                  KOTLIN_ANDROID_TEST: ${{ needs.kotlin-android-test.result }}
                  ES_TEST: ${{ needs.es-test.result }}
                  C_TEST: ${{ needs.c-test.result }}
                  C_TEST_WINDOWS: ${{ needs.c-test-windows.result }}
                  C_SANITIZER_TEST: ${{ needs.c-sanitizer-test.result }}
                  BENCHMARKS: ${{ needs.benchmarks-ready.result }}
              run: |
                  for result in \
                      "$SWIFT_TEST" \
                      "$KOTLIN_TEST" \
                      "$KOTLIN_ANDROID_TEST" \
                      "$ES_TEST" \
                      "$C_TEST" \
                      "$C_TEST_WINDOWS" \
                      "$C_SANITIZER_TEST" \
                      "$BENCHMARKS"
                  do
                      if [ "$result" != success ]; then
                          echo "A required test dependency concluded: $result" >&2
                          exit 1
                      fi
                  done

    required-gates:
        # Push runs use an independent, non-required context. PR and
        # merge-queue runs alone own the name referenced by the ruleset.
        name: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && 'Required gates' || 'Development branch gates' }}
        if: ${{ always() }}
        needs: tests-ready
        runs-on: ubuntu-latest
        steps:
            - name: Require the complete test layer
              env:
                  TESTS_READY: ${{ needs.tests-ready.result }}
              run: test "$TESTS_READY" = success
